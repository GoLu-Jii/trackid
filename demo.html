<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrakID — Curtain Pull Pitch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050505;
    overflow: hidden;
    height: 100vh; width: 100vw;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* ── LAYER 1: THE HERO PAGE ── */
  #hero {
    position: fixed; inset: 0;
    background: radial-gradient(circle at center 30%, #151518 0%, #050505 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1;
  }

  /* The actual 3D Hero Pendant (Simulated) */
  #hero-pendant-placeholder {
    position: absolute;
    top: 15%; /* Final resting height */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; 
    /* Starts hidden, appears the exact moment the intro logo stops spinning */
    opacity: 0; 
  }

  .hero-text {
    text-align: center;
    margin-top: 25vh; /* Pushed down to leave room for the pendant */
    opacity: 0; /* Fades in as curtain goes up */
    transform: translateY(20px);
  }
  
  #hero h1 { font-size: clamp(3rem, 8vw, 6rem); color: #fff; letter-spacing: -0.02em; font-weight: 600; margin-bottom: 0.5rem; }
  #hero p { font-size: 1.1rem; color: rgba(255,255,255,0.6); letter-spacing: 0.05em; }

  /* ── LAYER 2: THE BLACK CURTAIN ── */
  #intro-curtain {
    position: fixed; inset: 0;
    background: #030303;
    z-index: 5;
    will-change: transform;
  }

  /* ── LAYER 3: THE INTRO PENDANT (Animates independently) ── */
  #intro-pendant-container {
    position: fixed;
    /* Starts dead center */
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1) rotate(0deg);
    width: 200px; height: 260px;
    z-index: 10;
    will-change: top, transform, opacity;
  }

  #part-bail { transform-origin: center top; }
  #part-body { transform-origin: center center; }
  #part-pin  { transform-origin: center center; }
  #part-gem  { transform-origin: center center; }

  /* ── ANIMATIONS ── */

  /* 1. Assembly */
  @keyframes assembleBody { 0% { transform: translate(100vw, 100vh) rotate(180deg) scale(2); opacity: 0; } 100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; } }
  @keyframes assembleBail { 0% { transform: translate(-100vw, -100vh) rotate(-180deg) scale(2); opacity: 0; } 100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; } }
  @keyframes assemblePin  { 0% { transform: translate(-100vw, 100vh) rotate(90deg) scale(3); opacity: 0; } 100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; } }
  @keyframes assembleGem  { 0% { transform: translate(100vw, -100vh) scale(0); opacity: 0; } 100% { transform: translate(0, 0) scale(1); opacity: 1; } }

  /* 2. The Curtain Slide */
  @keyframes curtainUp {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-100%); }
  }

  /* 3. The Logo Spin & Settle */
  /* Moves from 50% top down to 15% top, shrinks to 60% size, and does a full 360 spin */
  @keyframes logoSettle {
    0%   { top: 50%; transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    99%  { top: 15%; transform: translate(-50%, -50%) scale(0.6) rotate(360deg); opacity: 1; }
    /* The exact millisecond it finishes, it hides so the real 3D model can take over */
    100% { top: 15%; transform: translate(-50%, -50%) scale(0.6) rotate(360deg); opacity: 0; }
  }

  /* 4. Text Fade */
  @keyframes textFadeUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Replay Button */
  #replay { position: absolute; bottom: 2rem; right: 2rem; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: monospace; font-size: 0.75rem; padding: 0.8rem 1.5rem; cursor: pointer; display: none; text-transform: uppercase; transition: 0.3s; border-radius: 4px;}
  #replay:hover { background: rgba(255,255,255,0.15); }

</style>
</head>
<body>

<div id="hero">
  <div id="hero-pendant-placeholder">
    <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" width="100%">
      <ellipse cx="100" cy="18" rx="14" ry="6" fill="none" stroke="#666" stroke-width="4"/>
      <path d="M100 30 C60 30 30 70 30 120 C30 170 60 220 100 240 C140 220 170 170 170 120 C170 70 140 30 100 30Z" fill="url(#darkMetal)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
      <path d="M100 95 C88 95 78 105 78 117 C78 133 100 155 100 155 C100 155 122 133 122 117 C122 105 112 95 100 95Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
      <circle cx="100" cy="117" r="5" fill="rgba(255,255,255,0.3)"/>
      <circle cx="100" cy="135" r="18" fill="url(#darkGem)" opacity="0.9"/>
      <defs>
        <radialGradient id="darkMetal" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#555"/><stop offset="40%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#050505"/>
        </radialGradient>
        <radialGradient id="darkGem" cx="30%" cy="30%">
          <stop offset="0%" stop-color="#444"/><stop offset="100%" stop-color="#000"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div class="hero-text" id="hero-text">
    <h1>TrakID</h1>
    <p>Intelligence in motion.</p>
  </div>
</div>

<div id="intro-curtain"></div>

<div id="intro-pendant-container">
  <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
    <g id="part-bail">
      <ellipse cx="100" cy="18" rx="14" ry="6" fill="none" stroke="#666" stroke-width="4"/>
    </g>
    <g id="part-body">
      <path d="M100 30 C60 30 30 70 30 120 C30 170 60 220 100 240 C140 220 170 170 170 120 C170 70 140 30 100 30Z" fill="url(#darkMetal)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    </g>
    <g id="part-pin">
      <path d="M100 95 C88 95 78 105 78 117 C78 133 100 155 100 155 C100 155 122 133 122 117 C122 105 112 95 100 95Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
      <circle cx="100" cy="117" r="5" fill="rgba(255,255,255,0.3)"/>
    </g>
    <g id="part-gem">
      <circle cx="100" cy="135" r="18" fill="url(#darkGem)" opacity="0.9"/>
    </g>
  </svg>
</div>

<button id="replay" onclick="runSequence()">↺ Replay</button>

<script>
  const curtain = document.getElementById('intro-curtain');
  const introPendant = document.getElementById('intro-pendant-container');
  const heroPendant = document.getElementById('hero-pendant-placeholder');
  const heroText = document.getElementById('hero-text');
  
  const bail = document.getElementById('part-bail');
  const body = document.getElementById('part-body');
  const pin = document.getElementById('part-pin');
  const gem = document.getElementById('part-gem');
  
  const replayBtn = document.getElementById('replay');

  function runSequence() {
    replayBtn.style.display = 'none';
    
    // Reset everything
    curtain.style.animation = 'none';
    curtain.style.display = 'block';
    
    introPendant.style.animation = 'none';
    heroPendant.style.opacity = '0';
    heroText.style.animation = 'none';
    heroText.style.opacity = '0';
    
    bail.style.animation = 'none';
    body.style.animation = 'none';
    pin.style.animation = 'none';
    gem.style.animation = 'none';
    
    void introPendant.offsetWidth; 

    // 1. THE ASSEMBLY
    const easeIn = 'cubic-bezier(0.1, 0.9, 0.2, 1)';
    body.style.animation = `assembleBody 0.8s ${easeIn} forwards`;
    bail.style.animation = `assembleBail 0.9s ${easeIn} forwards`;
    pin.style.animation  = `assemblePin 1.0s ${easeIn} forwards`;
    gem.style.animation  = `assembleGem 1.1s ${easeIn} forwards`;

    // 2. THE CURTAIN PULL & LOGO SPIN
    setTimeout(() => {
      // Both use the exact same cubic-bezier so they move up smoothly together
      const smoothSlide = 'cubic-bezier(0.7, 0, 0.2, 1)';
      
      curtain.style.animation = `curtainUp 1.2s ${smoothSlide} forwards`;
      introPendant.style.animation = `logoSettle 1.2s ${smoothSlide} forwards`;
      heroText.style.animation = `textFadeUp 1s ease-out 0.4s forwards`;
      
      // 3. THE HANDOFF
      // Exactly 1.2 seconds later (when the animations finish), we fade in the "Live 3D" pendant
      setTimeout(() => {
        heroPendant.style.opacity = '1';
        curtain.style.display = 'none';
        replayBtn.style.display = 'block';
      }, 1200);

    }, 1800); // 1.8 seconds wait to admire the logo before sliding up
  }

  window.addEventListener('load', () => { setTimeout(runSequence, 300); });
</script>
</body>
</html>
